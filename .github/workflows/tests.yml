name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Print runtime diagnostics
        run: |
          python --version
          python -m pip --version
          python -m pytest --version
          openssl version
          openssl list -kem-algorithms || true
      - name: Run portable protocol tests
        run: python -m pytest -q -m 'not real_mlkem' -ra
      - name: Optional real OpenSSL ML-KEM integration check
        continue-on-error: true
        run: python -m pytest -q -m 'real_mlkem' -ra
